<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - Búsqueda del Tesoro</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos específicos para el menú, carrusel y reproductor de video en la página principal */
        body {
            background: linear-gradient(135deg, #2c1654 0%, #0d0614 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1 {
            color: #ffd700;
            margin-bottom: 25px;
            text-align: center;
            font-size: 2rem;
        }

        .seccion-contenedor {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .grid-botones {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 15px;
        }

        .btn-menu {
            background: linear-gradient(90deg, #ff758c 0%, #ff7eb3 100%);
            border: none;
            color: white;
            padding: 12px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-menu:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 12px rgba(255, 118, 140, 0.4);
        }

       /* Carrusel de fotos */
/* Carrusel de fotos */
.carrusel {
    position: relative;
    width: 100%;
    height: 250px;
    overflow: hidden; /* Oculta las imágenes que no están visibles */
    border-radius: 12px;
    margin: 15px auto;
    border: 2px solid #ffd700;
}

.carrusel-imagenes {
    display: flex;
    width: 700%; /* 7 imágenes = 700% de ancho */
    height: 100%;
    transition: transform 0.5s ease-in-out;
}

.carrusel-imagen {
    width: 14.28%; /* 100% / 7 imágenes = 14.28% */
    height: 100%;
    object-fit: cover;
}

.controles-carrusel {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}

.btn-control {
    background: rgba(255, 255, 255, 0.2);
    color: #fff;
    border: none;
    padding: 6px 15px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: bold;
}

.btn-control:hover {
    background: #ffd700;
    color: #11052c;
}

        /* Reproductor de video */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Relación de aspecto 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            margin-top: 15px;
        }

        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>¡Feliz Cumpleaños, Mi Amor! ❤️</h1>

    <div class="seccion-contenedor">
        <h2>QR & Estaciones</h2>
        <p>Selecciona la estación o página que deseas ver:</p>
        <div class="grid-botones">
            <a href="QR1.html" class="btn-menu">Estación 1</a>
            <a href="QR2.html" class="btn-menu">Estación 2</a>
            <a href="QR3.html" class="btn-menu">Estación 3</a>
            <a href="QR4.html" class="btn-menu">Estación 4</a>
            <a href="QR5.html" class="btn-menu">Estación 5</a>
            <a href="QR6.html" class="btn-menu">Estación 6</a>
        </div>
        <div style="margin-top: 15px;">
            <a href="codigo.html" class="btn-menu" style="background: linear-gradient(90deg, #ffd700 0%, #ffcc00 100%); color: #11052c;">🔑 Código Secreto</a>
        </div>
    </div>

    <div class="seccion-contenedor">
        <h2>Nuestros Momentos</h2>
        <div class="carrusel">
            <div class="carrusel-imagenes" id="carruselTrack">
                <img src="QR1.png" alt="Foto 1" class="carrusel-imagen">
                <img src="QR2.png" alt="Foto 2" class="carrusel-imagen">
                <img src="QR3.png" alt="Foto 3" class="carrusel-imagen">
                <img src="QR4.png" alt="Foto 4" class="carrusel-imagen">
                <img src="QR5.png" alt="Foto 5" class="carrusel-imagen">
                <img src="QR6.png" alt="Foto 6" class="carrusel-imagen">
                <img src="tu_imagen.jpg" alt="Foto 7" class="carrusel-imagen">
            </div>
        </div>
        <div class="controles-carrusel">
            <button class="btn-control" onclick="moverCarrusel(-1)">Anterior</button>
            <button class="btn-control" onclick="moverCarrusel(1)">Siguiente</button>
        </div>
    </div>

    <div class="seccion-contenedor">
        <h2>Video Sorpresa</h2>
        <p>Un recuerdo especial para ti:</p>
        <div class="video-wrapper">
            <iframe width="560" height="315" src="https://www.youtube.com/embed/8FhbH8dmhmE?si=ZDmAe51T1KX8yg4Y" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        <br>
        <a href="Atardecer.mp3">Descargar la Canción</a>
        </div>
    </div>

    <script>
        let indiceActual = 0;
const track = document.getElementById('carruselTrack'); // Asegúrate de que el id coincida, o usa 'carruselTrack'
const totalImagenes = 7; // Total de imágenes (seis QRs y una foto final)

function moverCarrusel(direccion) {
    indiceActual += direccion;
    
    if (indiceActual < 0) {
        indiceActual = totalImagenes - 1;
    } else if (indiceActual >= totalImagenes) {
        indiceActual = 0;
    }
    
    // Calcula el desplazamiento dinámicamente según el número de imágenes
    const desplazamiento = -indiceActual * (100 / totalImagenes);
    
    // Asegúrate de que el track tenga la propiedad transform
    const carruselTrack = document.getElementById('carruselTrack');
    if (carruselTrack) {
        carruselTrack.style.transform = `translateX(${desplazamiento}%)`;
    }
}
    </script>
</body>
</html>
